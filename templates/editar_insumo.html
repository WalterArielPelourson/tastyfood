{% extends "base.html" %}
{% block title %}Editar Insumo{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <!-- Card con diseño moderno -->
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="display-6 text-primary mb-2">
                            <i class="bi bi-box-seam"></i>
                        </div>
                        <h3 class="fw-bold">Editar Insumo</h3>
                        <p class="text-muted small">Actualiza los datos básicos de la materia prima.</p>
                    </div>
                    
                    <form action="{{ url_for('editar_insumo', id_insumo=insumo.id_insumo) }}" method="POST">
                        
                        <!-- Nombre del Insumo -->
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nombre del Insumo</label>
                            <input type="text" name="nombre" class="form-control form-control-lg rounded-3" 
                                   value="{{ insumo.nombre }}" required>
                        </div>

                        <div class="row mb-3">
                            <!-- Unidad de Medida -->
                            <div class="col-6">
                                <label class="form-label fw-bold">Unidad</label>
                                <select name="unidad_medida" class="form-select rounded-3">
                                    <option value="kg" {% if insumo.unidad_medida == 'kg' %}selected{% endif %}>Kilogramos (kg)</option>
                                    <option value="unidades" {% if insumo.unidad_medida == 'unidades' %}selected{% endif %}>Unidades</option>
                                    <option value="litros" {% if insumo.unidad_medida == 'litros' %}selected{% endif %}>Litros</option>
                                    <option value="gr" {% if insumo.unidad_medida == 'gr' %}selected{% endif %}>Gramos (gr)</option>
                                </select>
                            </div>
                            <!-- Stock Mínimo para alertas -->
                            <div class="col-6">
                                <label class="form-label fw-bold">Stock Mín. (Alerta)</label>
                                <input type="number" step="0.01" name="stock_minimo" class="form-control rounded-3" 
                                       value="{{ insumo.stock_minimo }}" required>
                            </div>
                        </div>

                        <!-- Precio de Compra -->
                        <div class="mb-4">
                            <label class="form-label fw-bold">Precio de Compra ($)</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                <input type="number" step="0.01" name="precio_compra" class="form-control rounded-3" 
                                       value="{{ insumo.precio_compra }}" required>
                            </div>
                            <div class="form-text">Este precio se usa para calcular tu ganancia real en los reportes.</div>
                        </div>

                        <!-- Botones de Acción -->
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold shadow-sm">
                                <i class="bi bi-check-circle me-2"></i>Guardar Cambios
                            </button>
                            <a href="{{ url_for('gestion_insumos') }}" class="btn btn-link text-muted">
                                Cancelar y volver
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    body { background-color: #f8f9fa; }
    .card { border-radius: 1.5rem; }
    .form-control:focus, .form-select:focus {
        border-color: #ff4757;
        box-shadow: 0 0 0 0.25rem rgba(255, 71, 87, 0.1);
    }
</style>
{% endblock %}
