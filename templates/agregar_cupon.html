{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow border-0 rounded-4">
            <div class="card-header bg-primary text-white py-3">
                <h4 class="mb-0 fw-bold">Crear Nuevo Cupón</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('agregar_cupon') }}" method="POST">
                    
                    {% if current_user.has_role('super_admin') %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Empresa</label>
                        <select name="id_empresa" class="form-select" required>
                            {% for e in empresas %}
                                <option value="{{ e.id_empresa }}">{{ e.nombre }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    {% endif %}

                    <div class="mb-3">
                        <label class="form-label fw-bold">Código del Cupón</label>
                        <input type="text" name="codigo" class="form-control" placeholder="Ej: VERANO2024" required style="text-transform: uppercase;">
                        <div class="form-text">Sin espacios. Los clientes deberán escribir esto exactamente.</div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Tipo de Descuento</label>
                            <select name="tipo" class="form-select" id="tipo_cupon">
                                <option value="porcentaje">Porcentaje (%)</option>
                                <option value="monto">Monto Fijo ($)</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Valor</label>
                            <input type="number" step="0.01" name="valor" class="form-control" placeholder="Ej: 20 o 500" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Mínimo de Compra ($)</label>
                        <input type="number" step="0.01" name="minimo_compra" class="form-control" value="0">
                        <div class="form-text">El cupón solo funcionará si el subtotal supera este monto.</div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold">Guardar Cupón</button>
                        <a href="{{ url_for('gestion_cupones') }}" class="btn btn-link text-muted">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
