{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-body p-4">
                    <h4 class="fw-bold mb-4">Agregar Nuevo Repartidor</h4>
                    
                    <form action="{{ url_for('agregar_repartidor') }}" method="POST">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Nombre</label>
                            <input type="text" name="nombre" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Apellido</label>
                            <input type="text" name="apellido" class="form-control" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Teléfono</label>
                            <input type="text" name="telefono" class="form-control">
                        </div>

                        {% if current_user.has_role('super_admin') %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Asignar a Empresa</label>
                            <select name="id_empresa_asignar" class="form-select">
                                {% for empresa in empresas_disponibles %}
                                    <option value="{{ empresa.id_empresa }}">{{ empresa.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        {% endif %}

                        <div class="mt-4">
                            <button type="submit" class="btn btn-danger w-100 rounded-pill fw-bold">
                                Guardar Repartidor
                            </button>
                            <a href="{{ url_for('gestion_repartidores') }}" class="btn btn-link w-100 text-muted mt-2">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
