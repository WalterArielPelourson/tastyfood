<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Imprimir Pedido #{{ id_pedido }}</title>
    <style>
        /* Optimización para papel térmico de 80mm */
        @page { size: 80mm auto; margin: 0; }
        body { width: 80mm; margin: 0; padding: 0; background: #fff; }
        
        .seccion-impresion {
            padding: 5px;
            overflow: hidden;
        }

        /* Salto de página para que el segundo ticket empiece de cero */
        .page-break { 
            page-break-after: always; 
            border-bottom: 3px dashed #000; /* Línea de corte visual */
            margin-bottom: 30px;
            padding-bottom: 30px;
        }

        @media print {
            .no-print { display: none; }
            body { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="seccion-impresion page-break">
        {{ ticket_cocina | safe }}
    </div>

    <div class="seccion-impresion">
        {{ ticket_cliente | safe }}
    </div>

    <script>
        window.onload = function() {
            window.print();
            // Descomenta la línea de abajo si quieres que se cierre solo al terminar
            // setTimeout(function(){ window.close(); }, 500);
        };
    </script>
</body>
</html>
